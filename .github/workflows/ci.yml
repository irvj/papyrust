name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        # Version pinned to match rust-toolchain.toml; bump both together.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

  epubcheck:
    name: epubcheck on sample build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        # Version pinned to match rust-toolchain.toml; bump both together.
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install ImageMagick
        # Used to generate a tiny real JPEG for the sample cover so
        # epubcheck has something it can actually decode.
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install epubcheck
        env:
          EPUBCHECK_VERSION: 5.1.0
        run: |
          curl -L -o /tmp/epubcheck.zip "https://github.com/w3c/epubcheck/releases/download/v${EPUBCHECK_VERSION}/epubcheck-${EPUBCHECK_VERSION}.zip"
          unzip -q /tmp/epubcheck.zip -d /tmp
          echo "EPUBCHECK_JAR=/tmp/epubcheck-${EPUBCHECK_VERSION}/epubcheck.jar" >> "$GITHUB_ENV"

      - name: Build sample EPUB
        run: |
          mkdir -p /tmp/sample
          cargo run --release -- init /tmp/sample/book
          # Generate a real 1x1 JPEG so epubcheck can decode it.
          convert -size 1x1 xc:white /tmp/sample/book/cover.jpg
          cargo run --release -- --path /tmp/sample/book build epub

      - name: Run epubcheck
        run: java -jar "$EPUBCHECK_JAR" /tmp/sample/book/build/untitled-book.epub
